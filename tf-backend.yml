AWSTemplateFormatVersion: '2010-09-09'
Description: Terraform backend infrastructure - S3 state bucket and DynamoDB lock table

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Substitutes Account ID at deployment time to create a unique bucket name per account
      # Bucket is a one-time setup and can be safely named uniquely for this purpose
      BucketName: !Sub '${AWS::AccountId}-terraform-state'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  TerraformStateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TerraformStateBucket
      PolicyDocument:
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt TerraformStateBucket.Arn
              - !Sub '${TerraformStateBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  TerraformLockTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Clear unique name to denote purpose, as this is a one-time setup per account
      TableName: terraform-state-locks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH

Outputs:
  StateBucketName:
    Description: S3 bucket name for Terraform state
    Value: !Ref TerraformStateBucket
    Export:
      Name: TerraformStateBucketName

  LockTableName:
    Description: DynamoDB table name for Terraform state locking
    Value: !Ref TerraformLockTable
    Export:
      Name: TerraformLockTableName
